name: release

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to PyPI
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.13"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
